name: "render_pipeline.module.nrd.name"
inputImageConfigs:
  - name: "diffuse_radiance"
    format: "R16G16B16A16_SFLOAT"
  - name: "specular_radiance"
    format: "R16G16B16A16_SFLOAT"
  - name: "direct_radiance"
    format: "R16G16B16A16_SFLOAT"
  - name: "diffuse_albedo"
    format: "R8G8B8A8_UNORM"
  - name: "specular_albedo"
    format: "R8G8B8A8_UNORM"
  - name: "normal_roughness"
    format: "R16G16B16A16_SFLOAT"
  - name: "motion_vector"
    format: "R16G16_SFLOAT"
  - name: "linear_depth"
    format: "R16_SFLOAT"
  - name: "first_hit_clear"
    format: "R16G16B16A16_SFLOAT"
  - name: "first_hit_base_emission"
    format: "R16G16B16A16_SFLOAT"
  - name: "fog_image"
    format: "R16G16B16A16_SFLOAT"
  - name: "diffuseHitDepthImage"
    format: "R16_SFLOAT"
  - name: "specularHitDepthImage"
    format: "R16_SFLOAT"
  - name: "first_hit_refraction"
    format: "R16G16B16A16_SFLOAT"
outputImageConfigs:
  - name: "denoised_radiance"
    format: "R16G16B16A16_SFLOAT"
attributeConfigs:
  - name: "render_pipeline.module.nrd.attribute.antilag_luminance_sigma_scale"
    type: "float_range:1.0-5.0"
    value: "4.0"
  - name: "render_pipeline.module.nrd.attribute.antilag_luminance_sensitivity"
    type: "float_range:1.0-5.0"
    value: "3.0"
  - name: "render_pipeline.module.nrd.attribute.responsive_accumulation_roughness_threshold"
    type: "float_range:0.0-1.0"
    value: "0.0"
  - name: "render_pipeline.module.nrd.attribute.responsive_accumulation_min_accumulated_frame_num"
    type: "int_range:0-3"
    value: "3"
  - name: "render_pipeline.module.nrd.attribute.max_accumulated_frame_num"
    type: "int_range:0-63"
    value: "60"
  - name: "render_pipeline.module.nrd.attribute.max_fast_accumulated_frame_num"
    type: "int_range:0-63"
    value: "3"
  - name: "render_pipeline.module.nrd.attribute.max_stabilized_frame_num"
    type: "int_range:0-63"
    value: "63"
  - name: "render_pipeline.module.nrd.attribute.history_fix_frame_num"
    type: "int_range:0-3"
    value: "3"
  - name: "render_pipeline.module.nrd.attribute.history_fix_base_pixel_stride"
    type: "int_range:1-64"
    value: "14"
  - name: "render_pipeline.module.nrd.attribute.history_fix_alternate_pixel_stride"
    type: "int_range:1-64"
    value: "14"
  - name: "render_pipeline.module.nrd.attribute.fast_history_clamping_sigma_scale"
    type: "float_range:1.0-3.0"
    value: "1.5"
  - name: "render_pipeline.module.nrd.attribute.diffuse_prepass_blur_radius"
    type: "float_range:0.0-300.0"
    value: "30.0"
  - name: "render_pipeline.module.nrd.attribute.specular_prepass_blur_radius"
    type: "float_range:0.0-300.0"
    value: "50.0"
  - name: "render_pipeline.module.nrd.attribute.min_hit_distance_weight"
    type: "float_range:0.0-0.2"
    value: "0.1"
  - name: "render_pipeline.module.nrd.attribute.min_blur_radius"
    type: "float_range:0.0-300.0"
    value: "1.0"
  - name: "render_pipeline.module.nrd.attribute.max_blur_radius"
    type: "float_range:0.0-300.0"
    value: "100.0"
  - name: "render_pipeline.module.nrd.attribute.lobe_angle_fraction"
    type: "float_range:0.0-1.0"
    value: "0.15"
  - name: "render_pipeline.module.nrd.attribute.roughness_fraction"
    type: "float_range:0.0-1.0"
    value: "0.15"
  - name: "render_pipeline.module.nrd.attribute.plane_distance_sensitivity"
    type: "float_range:0.0-1.0"
    value: "0.02"
  - name: "render_pipeline.module.nrd.attribute.specular_probability_thresholds_for_mv_modification_min"
    type: "float_range:0.0-1.0"
    value: "0.5"
  - name: "render_pipeline.module.nrd.attribute.specular_probability_thresholds_for_mv_modification_max"
    type: "float_range:0.0-1.0"
    value: "0.9"
  - name: "render_pipeline.module.nrd.attribute.firefly_suppressor_min_relative_scale"
    type: "float_range:1.0-3.0"
    value: "2.0"
  - name: "render_pipeline.module.nrd.attribute.min_material_for_diffuse"
    type: "float_range:0.0-255.0"
    value: "4.0"
  - name: "render_pipeline.module.nrd.attribute.min_material_for_specular"
    type: "float_range:0.0-255.0"
    value: "4.0"
  - name: "render_pipeline.module.nrd.attribute.checkerboard_mode"
    type: "enum:off-black-white"
    value: "off"
  - name: "render_pipeline.module.nrd.attribute.enable_anti_firefly"
    type: "bool"
    value: "render_pipeline.true"
  - name: "render_pipeline.module.nrd.attribute.hit_distance_reconstruction_mode"
    type: "enum:off-3x3-5x5"
    value: "5x5"
