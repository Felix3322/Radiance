name: "render_pipeline.module.ray_tracing.name"
inputImageConfigs: [ ]
outputImageConfigs:
  - name: "radiance"
    format: "R16G16B16A16_SFLOAT"
  - name: "diffuse_albedo_metallic"
    format: "R8G8B8A8_UNORM"
  - name: "specular_albedo"
    format: "R8G8B8A8_UNORM"
  - name: "normal_roughness"
    format: "R16G16B16A16_SFLOAT"
  - name: "motion_vector"
    format: "R16G16_SFLOAT"
  - name: "linear_depth"
    format: "R16_SFLOAT"
  - name: "specular_hit_depth"
    format: "R16_SFLOAT"
  - name: "first_hit_depth"
    format: "R16_SFLOAT"
  - name: "first_hit_diffuse_direct_light"
    format: "R16G16B16A16_SFLOAT"
  - name: "first_hit_diffuse_indirect_light"
    format: "R16G16B16A16_SFLOAT"
  - name: "first_hit_specular"
    format: "R16G16B16A16_SFLOAT"
  - name: "first_hit_clear"
    format: "R16G16B16A16_SFLOAT"
  - name: "first_hit_base_emission"
    format: "R16G16B16A16_SFLOAT"
  - name: "fog_image"
    format: "R16G16B16A16_SFLOAT"
  - name: "first_hit_refraction"
    format: "R16G16B16A16_SFLOAT"
attributeConfigs:
  - name: "render_pipeline.module.ray_tracing.attribute.shader_pack_path"
    type: "string"
    value: ""
  - name: "render_pipeline.module.ray_tracing.attribute.num_ray_bounces"
    type: "int_range:1-128"
    value: "4"
  - name: "render_pipeline.module.ray_tracing.attribute.use_jitter"
    type: "bool"
    value: "render_pipeline.true"
  - name: "render_pipeline.module.ray_tracing.attribute.pbr_sampling_mode"
    type: "enum:render_pipeline.module.ray_tracing.attribute.pbr_sampling.nearest-render_pipeline.module.ray_tracing.attribute.pbr_sampling.bilinear"
    value: "render_pipeline.module.ray_tracing.attribute.pbr_sampling.nearest"
  - name: "render_pipeline.module.ray_tracing.attribute.transparent_split_mode"
    type: "enum:render_pipeline.module.ray_tracing.attribute.transparent_split_mode.deterministic-render_pipeline.module.ray_tracing.attribute.transparent_split_mode.stochastic"
    value: "render_pipeline.module.ray_tracing.attribute.transparent_split_mode.deterministic"
  - name: "render_pipeline.module.ray_tracing.attribute.direct_light_strength"
    type: "float_range:0.0-32.0"
    value: "1.0"
  - name: "render_pipeline.module.ray_tracing.attribute.indirect_light_strength"
    type: "float_range:0.0-64.0"
    value: "16.0"
  - name: "render_pipeline.module.ray_tracing.attribute.basic_radiance"
    type: "float_range:0.0-10.0"
    value: "5.0"
  - name: "render_pipeline.module.ray_tracing.attribute.atmosphere_planet_radius"
    type: "float_range:1000.0-10000.0"
    value: "6360.0"
  - name: "render_pipeline.module.ray_tracing.attribute.atmosphere_top_radius"
    type: "float_range:1000.0-10000.0"
    value: "6460.0"
  - name: "render_pipeline.module.ray_tracing.attribute.rayleigh_scale_height"
    type: "float_range:0.0-100.0"
    value: "8.0"
  - name: "render_pipeline.module.ray_tracing.attribute.mie_scale_height"
    type: "float_range:0.0-20.0"
    value: "1.2"
  - name: "render_pipeline.module.ray_tracing.attribute.rayleigh_scattering_coefficient"
    type: "vec3"
    value: "0.000005802,0.000013558,0.0000331"
  - name: "render_pipeline.module.ray_tracing.attribute.mie_anisotropy"
    type: "float_range:-0.99-0.99"
    value: "0.8"
  - name: "render_pipeline.module.ray_tracing.attribute.mie_scattering_coefficient"
    type: "vec3"
    value: "0.000021,0.000021,0.000021"
  - name: "render_pipeline.module.ray_tracing.attribute.minimum_view_cosine"
    type: "float_range:-1.0-1.0"
    value: "0.02"
  - name: "render_pipeline.module.ray_tracing.attribute.sun_radiance"
    type: "vec3"
    value: "8.0,8.0,8.0"
  - name: "render_pipeline.module.ray_tracing.attribute.moon_radiance"
    type: "vec3"
    value: "0.24,0.3,0.6"
  - name: "render_pipeline.module.ray_tracing.attribute.use_sharc"
    type: "bool"
    value: "render_pipeline.true"
  - name: "render_pipeline.module.ray_tracing.attribute.sharc_debug_mode"
    type: "enum:off-hash_grid-occupancy-heatmap"
    value: "off"
